<!DOCTYPE html>
<html lang="en">
<head>
    <title>EthosAI Wage Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="wage-page">

<button onclick="toggleDarkMode()" style="position:absolute; top:20px; right:20px;">
    🌙
</button>  

<div class="login-box">

    <h1>💰 AI Wage Calculator</h1>
    <p>Powered by Gemini AI</p>

    <label>Task Complexity</label>
    <select id="complexity" required>
        <option value="" disabled selected>Select complexity</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
    </select>

    <label>Hours Worked</label>
    <input type="number" id="hours" placeholder="Enter hours">

    <label>Performance (%)</label>
    <input type="number" id="performance" placeholder="Enter performance">

    <button onclick="calculateWage()">
        Calculate with AI
    </button>

    <!-- RESULT -->
    <div id="result"></div>

    <button onclick="goBack()">← Back</button>

</div>

<script>

function goBack() {
    window.location.href = "dashboard.html";
}

function calculateWage() {

    const complexity = document.getElementById("complexity").value;
    const hours = document.getElementById("hours").value;
    const performance = document.getElementById("performance").value;

    if (!complexity) {
        alert("Please select complexity");
        return;
    }

    if (!hours || !performance) {
        alert("Please fill all fields");
        return;
    }

    // 💰 Base logic
    let rate;
    if (complexity === "Low") rate = 500;
    else if (complexity === "Medium") rate = 1000;
    else if (complexity === "High") rate = 1500;

    let wage = rate * hours * (performance / 100);

    // 🤖 LOADING UI
    document.getElementById("result").innerHTML = `
        <div class="result-box">
            <p>🤖 AI is analyzing your work...</p>
            <div class="loader"></div>
        </div>
    `;

    // ⏳ DELAY
    setTimeout(() => {
        localStorage.setItem("lastWage", Math.round(wage));
        let reason = `Based on ${complexity} complexity, ${hours} hours, and ${performance}% performance, a fair wage is calculated.`;

        // 💾 Save earnings
        let currentEarnings = Number(localStorage.getItem("earnings")) || 0;
        currentEarnings += wage;
        localStorage.setItem("earnings", currentEarnings);

        // 🎨 RESULT
        document.getElementById("result").innerHTML = `
            <div class="result-box">
                <h2>💰 AI Result</h2>
                <p style="font-size:28px; font-weight:bold; color:#FFD700;">
                    ₹${Math.round(wage)}
                </p>
                <p>${reason}</p>
                <p style="color:lightgreen; margin-top:10px;">
                ✅ ₹${Math.round(wage)} added to your earnings
                </p>
            </div>
        `;

    }, 1500);
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
